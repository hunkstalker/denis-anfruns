version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    allow:
      - dependency-type: "direct"
    ignore:
      - dependency-name: "*" # Se añade para aplicar el filtro a todos los paquetes
        update-types: ["version-update:semver-major"]
    labels:
      - "deps"
      - "dependabot"